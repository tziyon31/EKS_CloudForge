name: EKS CloudForge CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "app/**"
      - "helm/**"
      - "terraform/**"
      - "monitoring/**"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "app/**"
      - "helm/**"
      - "terraform/**"
      - "monitoring/**"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        default: dev
        options:
          - dev
          - staging
          - prod
      deploy_infrastructure:
        description: "Run Terraform apply"
        type: boolean
        default: false
      deploy_application:
        description: "Deploy app via Helm"
        type: boolean
        default: false
      deploy_monitoring:
        description: "Deploy monitoring stack"
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  actions: read

env:
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ vars.AWS_SECRET_ACCESS_KEY }}
  APP_NAME: eks-cloudforge-app
  IMAGE_TAG: ${{ github.sha }}
  TF_IN_AUTOMATION: true
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  TF_WORKSPACE: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  code-quality:
    name: 1) Code Quality & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/requirements-test.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt

      - name: Format check (black)
        run: black --check .

      - name: Import sort check (isort)
        run: isort --check-only .

      - name: Lint (flake8)
        run: flake8 .

      - name: Unit tests with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report
          path: app/coverage.xml

  security-scan:
    name: 2) Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/requirements-test.txt

      - name: Install security tooling
        run: |
          pip install -r app/requirements-test.txt

      - name: Bandit scan (source code)
        run: |
          bandit -r app -f json -o bandit-report.json || true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            trivy-results.sarif

  docker-build:
    name: 3) Docker Build & Push
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan]
    outputs:
      image_uri: ${{ steps.export-image.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR repository
        id: resolve-repo
        run: |
          if [ -n "${{ secrets.ECR_REPOSITORY }}" ]; then
            REPOSITORY="${{ secrets.ECR_REPOSITORY }}"
          else
            REPOSITORY="cloudforge-app"
          fi
          echo "repository=$REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        working-directory: app
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.resolve-repo.outputs.repository }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Export image URI
        id: export-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.resolve-repo.outputs.repository }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          echo "image_uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  infrastructure:
    name: 4) Terraform Infra
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan]
    outputs:
      cluster_name: ${{ steps.tf-outputs.outputs.cluster_name }}
      ecr_url: ${{ steps.tf-outputs.outputs.ecr_url }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform init
        run: terraform init

      - name: Select or create workspace
        run: |
          terraform workspace select "$TF_WORKSPACE" || terraform workspace new "$TF_WORKSPACE"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -var="environment=$ENVIRONMENT" -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_infrastructure == 'true'
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs
        id: tf-outputs
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_infrastructure == 'true'
        run: |
          echo "cluster_name=$(terraform output -raw eks_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

  application-deployment:
    name: 5) Helm App Release
    runs-on: ubuntu-latest
    needs: [docker-build, infrastructure]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_application == 'true'
    defaults:
      run:
        working-directory: helm/app-chart
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.3"

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.13.3"

      - name: Configure kubeconfig
        env:
          CLUSTER_NAME: ${{ needs.infrastructure.outputs.cluster_name }}
        run: |
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"

      - name: Helm lint
        run: helm lint .

      - name: Resolve image values
        id: image-values
        run: |
          IMAGE_URI="${{ needs.docker-build.outputs.image_uri }}"
          IMAGE_REPO="${IMAGE_URI%:*}"
          IMAGE_TAG="${IMAGE_URI##*:}"
          echo "repository=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy app chart (atomic)
        run: |
          helm upgrade --install "$APP_NAME" . \
            --namespace default \
            --create-namespace \
            --set image.repository="${{ steps.image-values.outputs.repository }}" \
            --set image.tag="${{ steps.image-values.outputs.tag }}" \
            --set autoscaling.enabled=true \
            --set monitoring.enabled=true \
            --wait --timeout 10m --atomic

      - name: Verify app rollout
        run: |
          kubectl rollout status deployment/"$APP_NAME" -n default --timeout=180s
          kubectl get pods -n default -l app.kubernetes.io/name=eks-cloudforge-app
          kubectl get hpa -n default

  monitoring-deployment:
    name: 6) Monitoring Stack
    runs-on: ubuntu-latest
    needs: [application-deployment, infrastructure]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_monitoring == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.3"

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.13.3"

      - name: Configure kubeconfig
        env:
          CLUSTER_NAME: ${{ needs.infrastructure.outputs.cluster_name }}
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"

      - name: Deploy monitoring stack
        run: |
          chmod +x monitoring/deploy-monitoring.sh
          ./monitoring/deploy-monitoring.sh

  verify-release:
    name: 7) Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [application-deployment, monitoring-deployment]
    if: always() && github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.3"

      - name: Configure kubeconfig
        env:
          CLUSTER_NAME: ${{ needs.infrastructure.outputs.cluster_name }}
        run: |
          if [ -n "$CLUSTER_NAME" ]; then
            aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"
          else
            echo "Cluster name not exported from infra job. Skipping kubeconfig."
          fi

      - name: Validate workloads
        run: |
          if kubectl cluster-info >/dev/null 2>&1; then
            kubectl get pods -A
            kubectl get svc -A
            kubectl get hpa -A || true
            kubectl get servicemonitor -A || true
            kubectl get prometheusrule -A || true
          else
            echo "Cluster is not reachable in this run."
          fi

      - name: Deployment summary
        run: |
          echo "Pipeline finished."
          echo "Environment: $ENVIRONMENT"
          echo "Image: ${{ needs.docker-build.outputs.image_uri }}"
